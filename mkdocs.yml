site_name: Chango
site_url: https://cloudcheflabs.github.io/chango-private-docs
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - header.autohide
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: custom
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: custom
      accent: lime
  logo: images/logo/chango-logo.png
  favicon: images/logo/chango-logo.png


nav:
  - "Home": index.md
  - "Architecture":
      - "Chango Architecture": architecture/architecture.md
      - "Component Lifecycle": architecture/component-lifecycle.md
      - "Internal Protocol": architecture/internal-protocol.md
  - "Installation":
      - "Overview": installation/index.md
      - "Node Preparation": installation/node-preparation.md
      - "Manual Install": installation/manual.md
      - "Automated Install (Ansible)": installation/automated.md
      - "Local Docker Cluster": installation/docker.md
      - "Getting Started": installation/getting-started.md
  - "Features":
      - "Control Plane": features/control-plane.md
      - "Cluster Topology": features/topology.md
      - "Identity & Access Management": features/iam.md
      - "Admin Password Recovery": features/admin-password-recovery.md
      - "Encryption & Key Management": features/kms.md
      - "Port Allocator": features/port-allocator.md
      - "Hosts Sync": features/hosts-sync.md
      - "UI Proxy": features/ui-proxy.md
      - "Monitoring & Metrics": features/monitoring.md
      - "Logging": features/logging.md
      - "Backup & Restore": features/backup.md
  - "Components":
      - "Catalog": components/catalog.md
      - "Versions": components/versions.md
  - "Operations":
      - "Cluster Operations": operations/cluster-operations.md
      - "Component Operations": operations/component-operations.md
      - "Nginx Reverse Proxy": operations/nginx-proxy.md
      - "Upgrade": operations/upgrade.md
  - "Tutorials":
      - "Overview": tutorials/index.md
      - "Phase 0 — Foundation Install": tutorials/phase-0-foundation.md
      - "Phase 1 — Trino + Iceberg + RBAC": tutorials/phase-1-trino-iceberg-rbac.md
      - "Phase 2 — Spark + Iceberg": tutorials/phase-2-spark-iceberg.md
      - "Phase 2b — Spark via Livy REST": tutorials/phase-2b-spark-via-livy.md
      - "Phase 3 — kiok DAG (SSH to Spark master)": tutorials/phase-3-kiok-spark.md
      - "Phase 3b — kiok DAG via Livy REST": tutorials/phase-3b-kiok-via-livy.md
      - "Phase 4 — Iceberg table maintenance": tutorials/phase-4-iceberg-maintenance.md
      - "Phase 5 — Kafka + Flink + Iceberg streaming": tutorials/phase-5-kafka-flink-iceberg.md
      - "Phase 6 — kiok native livy task + Polaris": tutorials/phase-6-kiok-livy-spark-iceberg-polaris.md
      - "Phase 7 — kiok DAG (trino-gw + ontul)": tutorials/phase-7-kiok-dag-trino-ontul-via-gateway.md


extra:
  generator: false
  version:
    provider: mike
    default: 3.0.0


extra_css:
  - stylesheets/extra.css


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

copyright: |
  © <script>document.write(new Date().getFullYear())</script> Cloud Chef Labs, Inc. All rights reserved. <a href="mailto:admin@cloudchef-labs.com">admin@cloudchef-labs.com</a>
